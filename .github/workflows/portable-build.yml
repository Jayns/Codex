name: Portable launcher build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-portable:
    name: Windows portable launcher
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build portable launcher
        run: cargo build --release -p codex-plus-launcher --bin codex

      - name: Upload codex.exe
        uses: actions/upload-artifact@v4
        with:
          name: codex-portable-windows-x64
          path: target/release/codex.exe
          if-no-files-found: error

  macos-portable:
    name: macOS portable app (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build portable launcher
        run: cargo build --release -p codex-plus-launcher --bin codex --target ${{ matrix.target }}

      - name: Package Codex Portable.app
        run: |
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/codex" target/release/codex
          bash scripts/installer/macos/package-portable.sh dist/macos/portable

      # Zip with ditto so the .app keeps its executable bits and structure;
      # upload-artifact alone would strip them.
      - name: Zip .app bundle
        run: |
          cd dist/macos/portable
          ditto -c -k --keepParent "Codex Portable.app" "codex-portable-macos-${{ matrix.arch }}.zip"

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: codex-portable-macos-${{ matrix.arch }}
          path: dist/macos/portable/codex-portable-macos-${{ matrix.arch }}.zip
          if-no-files-found: error
