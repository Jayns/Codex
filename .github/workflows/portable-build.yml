name: Portable launcher build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  windows-portable:
    name: Windows portable launcher
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build portable launcher
        run: cargo build --release -p codex-plus-launcher --bin chatgpt-launcher

      - name: Upload chatgpt-launcher.exe
        uses: actions/upload-artifact@v4
        with:
          name: codex-portable-windows-x64
          path: target/release/chatgpt-launcher.exe
          if-no-files-found: error

  macos-portable:
    name: macOS portable app (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build portable launcher
        run: cargo build --release -p codex-plus-launcher --bin chatgpt-launcher --target ${{ matrix.target }}

      - name: Build manager frontend
        working-directory: apps/codex-plus-manager
        run: |
          npm install --package-lock=false
          npm run vite:build

      # Native build (no --target): the manager .app is bundled as a sibling
      # to the launcher and only needs to match this runner's own
      # architecture, same as matrix.target does for the launcher above.
      - name: Build manager (skin-only companion)
        run: cargo build --release -p codex-plus-manager --bin codex-plus-plus-manager

      - name: Package ChatGPT Launcher.app + Codex++ 管理工具.app
        run: |
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/chatgpt-launcher" target/release/chatgpt-launcher
          bash scripts/installer/macos/package-portable.sh dist/macos/portable

      # Zip the whole portable folder (both .app bundles + 使用说明.txt) with
      # ditto so they keep their executable bits and bundle structure;
      # upload-artifact alone would strip them.
      - name: Zip portable folder
        run: ditto -c -k --keepParent dist/macos/portable "dist/macos/codex-portable-macos-${{ matrix.arch }}.zip"

      - name: Upload portable app
        uses: actions/upload-artifact@v4
        with:
          name: codex-portable-macos-${{ matrix.arch }}
          path: dist/macos/codex-portable-macos-${{ matrix.arch }}.zip
          if-no-files-found: error
